<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-lg">
    <!-- Auth Section -->
    <div id="authSection" class="bg-white rounded-2xl shadow-2xl p-8 space-y-6">
      <div class="text-center">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Task Manager</h1>
        <p class="text-gray-500">Organize your work efficiently</p>
      </div>

      <!-- Login Form -->
      <div id="loginForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input 
            id="loginEmail" 
            type="email"
            placeholder="Enter your email" 
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          >
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input 
            id="loginPassword" 
            type="password"
            placeholder="Enter your password" 
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          >
        </div>

        <button 
          onclick="login()" 
          class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-semibold py-3 rounded-lg transition duration-200 transform hover:scale-105"
        >
          Login
        </button>

        <p class="text-center text-gray-600">
          Don't have an account? 
          <button onclick="toggleAuthMode()" class="text-blue-600 hover:text-blue-700 font-semibold">
            Register
          </button>
        </p>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="hidden space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
          <input 
            id="registerUsername" 
            type="text"
            placeholder="Choose a username" 
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          >
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input 
            id="registerEmail" 
            type="email"
            placeholder="Enter your email" 
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          >
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
          <input 
            id="registerPassword" 
            type="password"
            placeholder="Create a password" 
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
          >
        </div>

        <button 
          onclick="register()" 
          class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-semibold py-3 rounded-lg transition duration-200 transform hover:scale-105"
        >
          Register
        </button>

        <p class="text-center text-gray-600">
          Already have an account? 
          <button onclick="toggleAuthMode()" class="text-blue-600 hover:text-blue-700 font-semibold">
            Login
          </button>
        </p>
      </div>
    </div>

    <!-- Tasks Section -->
    <div id="tasksSection" class="hidden bg-white rounded-2xl shadow-2xl p-8 space-y-6">
      <div class="flex justify-between items-center">
        <div>
          <h1 class="text-3xl font-bold text-gray-800">Tasks</h1>
          <p id="taskCount" class="text-sm text-gray-500 mt-1">0 tasks</p>
        </div>
        <button 
          onclick="logout()" 
          class="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-100 rounded-lg transition"
        >
          Logout
        </button>
      </div>

      <!-- Add Task Form -->
      <div class="space-y-3">
        <input 
          id="title" 
          type="text"
          placeholder="Task title..." 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        >
        <textarea 
          id="description" 
          type="text"
          placeholder="Task description (optional)" 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none"
          rows="2"
        ></textarea>
        <button 
          onclick="createTask()" 
          class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 text-white font-semibold px-6 py-3 rounded-lg transition duration-200 transform hover:scale-105"
        >
          Add Task
        </button>
      </div>

      <!-- Tasks List -->
      <div id="tasks" class="space-y-3 max-h-96 overflow-y-auto">
        <!-- Tasks will be loaded here -->
      </div>

      <!-- Empty State -->
      <div id="emptyState" class="text-center py-8">
        <p class="text-gray-400 text-lg">No tasks yet. Create one to get started!</p>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-2xl p-8 max-w-lg w-full space-y-4">
      <h2 class="text-2xl font-bold text-gray-800">Edit Task</h2>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Title</label>
        <input 
          id="editTitle" 
          type="text"
          placeholder="Task title" 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition"
        >
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
        <textarea 
          id="editDescription" 
          placeholder="Task description" 
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition resize-none"
          rows="3"
        ></textarea>
      </div>
      <div>
        <label class="flex items-center gap-2 cursor-pointer">
          <input 
            id="editCompleted" 
            type="checkbox" 
            class="w-5 h-5 text-blue-500 rounded focus:ring-2 focus:ring-blue-500"
          >
          <span class="text-gray-700 font-medium">Mark as complete</span>
        </label>
      </div>
      <div class="flex gap-3">
        <button 
          onclick="saveEdit()" 
          class="flex-1 bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 rounded-lg transition"
        >
          Save
        </button>
        <button 
          onclick="closeEditModal()" 
          class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 rounded-lg transition"
        >
          Cancel
        </button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
